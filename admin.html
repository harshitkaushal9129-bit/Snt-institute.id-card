<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SNT Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-8">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-black text-blue-900">SNT <span class="text-orange-500">DASHBOARD</span></h1>
            <a href="index.html" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold shadow-md">ADD NEW +</a>
        </div>

        <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-blue-900 text-white uppercase text-sm">
                    <tr>
                        <th class="p-4">Student</th>
                        <th class="p-4">Roll Number</th>
                        <th class="p-4">Course</th>
                        <th class="p-4">Contact</th>
                        <th class="p-4">Action</th>
                    </tr>
                </thead>
                <tbody id="adminTable" class="divide-y divide-gray-200">
                    </tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDXSZ4T5Yma9Wd28v_GN0zEV4g34SsXmVc",
            authDomain: "id-card-48ec8.firebaseapp.com",
            projectId: "id-card-48ec8",
            storageBucket: "id-card-48ec8.firebasestorage.app",
            messagingSenderId: "314458314948",
            appId: "1:314458314948:web:192021fe6cc760dafcd191"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        onSnapshot(collection(db, "students"), (snap) => {
            const tbody = document.getElementById('adminTable');
            tbody.innerHTML = "";
            snap.forEach(docSnap => {
                const s = docSnap.data();
                tbody.innerHTML += `
                    <tr class="hover:bg-blue-50 transition">
                        <td class="p-4 font-bold text-gray-800">${s.name}</td>
                        <td class="p-4 font-mono text-blue-600">${s.rollNo}</td>
                        <td class="p-4"><span class="bg-orange-100 text-orange-600 px-3 py-1 rounded-full text-xs font-bold">${s.course}</span></td>
                        <td class="p-4 text-gray-500">${s.contact}</td>
                        <td class="p-4">
                            <button onclick="window.del('${docSnap.id}')" class="text-red-500 hover:text-red-700 font-bold">DELETE</button>
                        </td>
                    </tr>
                `;
            });
        });

        window.del = async (id) => {
            if(confirm("Delete this record?")) await deleteDoc(doc(db, "students", id));
        };
    </script>
</body>
</html>
