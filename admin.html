<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - Batch Print</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            .no-print { display: none; }
            body { background: white; padding: 0; }
            .a4-page { width: 210mm; padding: 5mm; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 0; }
        }
        .id-card-mini { width: 95mm; height: 55mm; border: 1px solid #000; display: flex; padding: 5px; font-family: Arial; position: relative; overflow: hidden; }
    </style>
</head>
<body class="bg-gray-800 p-10">
    <div class="no-print mb-6 flex justify-between max-w-5xl mx-auto text-white">
        <h1 class="text-2xl font-bold">Admin Batch Print (Latest 10)</h1>
        <button onclick="window.print()" class="bg-green-600 px-6 py-2 rounded-lg font-bold">PRINT A4 SHEET</button>
    </div>

    <div id="printArea" class="a4-page bg-white mx-auto shadow-2xl shadow-black min-h-[297mm]">
        </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getDatabase, ref, get, query, limitToLast } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";

        const firebaseConfig = { /* Paste Same Config Here */ };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        async function loadBatch() {
            const snap = await get(query(ref(db, 'students'), limitToLast(10)));
            const container = document.getElementById('printArea');
            
            if(snap.exists()){
                const data = snap.val();
                Object.values(data).reverse().forEach(s => {
                    container.innerHTML += `
                        <div class="id-card-mini bg-white border">
                            <div class="w-1/3 text-center border-r pr-2">
                                <img src="${s.photo}" class="w-full h-24 object-cover border mb-1">
                                <img src="https://api.qrserver.com/v1/create-qr-code/?data=${encodeURIComponent(s.verifyURL)}" class="w-12 h-12 mx-auto">
                            </div>
                            <div class="w-2/3 pl-2 flex flex-col justify-between">
                                <div>
                                    <h4 class="text-[12px] font-bold text-blue-900 border-b">${s.name}</h4>
                                    <p class="text-[10px]"><b>ID:</b> ${s.rollNo}</p>
                                    <p class="text-[10px]"><b>Course:</b> ${s.course}</p>
                                    <p class="text-[10px]"><b>Father:</b> ${s.fatherName}</p>
                                    <p class="text-[10px]"><b>DOB:</b> ${s.dob}</p>
                                </div>
                                <div class="text-[9px] font-bold text-center bg-blue-900 text-white p-1">SNT COMPUTER INSTITUTE</div>
                            </div>
                        </div>
                    `;
                });
            }
        }
        loadBatch();
    </script>
</body>
</html>
