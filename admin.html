<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNT Admin - Print Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Screen View Styles */
        .id-card-print {
            width: 95mm; height: 60mm; background: white; border-radius: 12px;
            overflow: hidden; position: relative; border: 1px solid #003366;
            font-family: Arial, sans-serif; margin-bottom: 10px;
        }
        .header-blue {
            background: linear-gradient(90deg, #003366, #004080);
            height: 15mm; display: flex; align-items: center; padding: 0 10px;
        }
        .details-area { display: flex; padding: 10px; gap: 10px; }
        .photo-frame {
            width: 32mm; height: 38mm; border: 2px solid #003366;
            border-radius: 8px; overflow: hidden; background: #f0f4f8;
        }
        .qr-wrapper {
            position: absolute; bottom: 40px; left: 15px; background: white;
            padding: 3px; border: 1px solid #ccc; border-radius: 4px;
        }
        .footer-dark {
            background: #00051a; height: 8mm; color: white; width: 100%;
            position: absolute; bottom: 0; display: flex; justify-content: center;
            align-items: center; font-size: 9px; font-weight: bold;
        }

        @media print {
            .no-print { display: none !important; }
            body { background: white; margin: 0; padding: 0; }
            .a4-page {
                display: grid; grid-template-columns: 1fr 1fr;
                gap: 5mm; padding: 5mm; width: 210mm; box-shadow: none;
            }
            .id-card-print { border: 1px solid #003366; break-inside: avoid; }
            * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
    </style>
</head>
<body class="bg-gray-800 p-4">

    <div class="no-print max-w-5xl mx-auto mb-8 bg-white p-6 rounded-xl shadow-2xl">
        <div class="flex flex-wrap justify-between items-center gap-4">
            <h1 class="text-xl font-black text-blue-900">SNT PRINT HUB</h1>
            <div class="flex gap-2">
                <input type="number" id="startNum" placeholder="Start (1)" class="border p-2 w-24 rounded" value="1">
                <input type="number" id="endNum" placeholder="End (10)" class="border p-2 w-24 rounded" value="10">
                <button onclick="preparePrint()" class="bg-blue-600 text-white px-5 py-2 rounded font-bold hover:bg-blue-700">Prepare</button>
                <button onclick="window.print()" class="bg-green-600 text-white px-5 py-2 rounded font-bold">Print Now</button>
            </div>
        </div>
        
        <div class="mt-6 overflow-x-auto">
            <table class="w-full text-sm text-left">
                <thead class="bg-gray-100 uppercase">
                    <tr>
                        <th class="p-2 border">#</th>
                        <th class="p-2 border">Photo</th>
                        <th class="p-2 border">Name</th>
                        <th class="p-2 border">Roll</th>
                        <th class="p-2 border">Action</th>
                    </tr>
                </thead>
                <tbody id="studentTable"></tbody>
            </table>
        </div>
    </div>

    <div id="printArea" class="a4-page bg-white mx-auto min-h-[297mm] shadow-inner">
        <p class="no-print p-10 text-center text-gray-400 font-bold">Prepare par click karein cards yahan dikhenge...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getDatabase, ref, get, remove } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDXSZ4T5Yma9Wd28v_GN0zEV4g34SsXmVc",
            authDomain: "id-card-48ec8.firebaseapp.com",
            databaseURL: "https://id-card-48ec8-default-rtdb.firebaseio.com",
            projectId: "id-card-48ec8",
            storageBucket: "id-card-48ec8.firebasestorage.app",
            messagingSenderId: "314458314948",
            appId: "1:314458314948:web:192021fe6cc760dafcd191"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let studentsList = [];

        async function loadTable() {
            const snap = await get(ref(db, 'students'));
            const table = document.getElementById('studentTable');
            table.innerHTML = "";
            studentsList = [];

            if(snap.exists()){
                let i = 1;
                snap.forEach(child => {
                    const s = child.val();
                    studentsList.push(s);
                    table.innerHTML += `
                        <tr class="border-b">
                            <td class="p-2 border font-bold">${i}</td>
                            <td class="p-2 border"><img src="${s.photo}" class="w-8 h-8 rounded border object-cover"></td>
                            <td class="p-2 border font-bold uppercase">${s.name}</td>
                            <td class="p-2 border">${s.rollNo}</td>
                            <td class="p-2 border text-red-600 cursor-pointer" onclick="deleteRecord('${s.rollNo}')">Delete</td>
                        </tr>
                    `;
                    i++;
                });
            }
        }

        window.preparePrint = () => {
            const start = parseInt(document.getElementById('startNum').value) - 1;
            const end = parseInt(document.getElementById('endNum').value);
            const area = document.getElementById('printArea');
            
            if(studentsList.length === 0) {
                alert("Data abhi load ho raha hai, thoda intezar karein.");
                return;
            }

            const selected = studentsList.slice(start, end);
            if(selected.length === 0) {
                alert("Iss range mein koi data nahi mila!");
                return;
            }

            area.innerHTML = "";
            selected.forEach(s => {
                area.innerHTML += `
                    <div class="id-card-print">
                        <div class="header-blue">
                            <img src="Logo (1).jpg" class="h-10 bg-white p-1 rounded">
                            <div class="ml-2 text-white font-bold text-xs uppercase">SNT COMPUTER INSTITUTE</div>
                        </div>
                        <div class="details-area">
                            <div class="photo-frame">
                                <img src="${s.photo}" class="w-full h-full object-cover">
                            </div>
                            <div class="flex-1">
                                <h2 class="text-blue-900 font-black text-sm uppercase leading-tight">${s.name}</h2>
                                <p class="text-orange-600 text-[10px] font-bold italic border-b mb-1 uppercase">${s.course}</p>
                                <div class="text-[9px] space-y-1">
                                    <p><b>ROLL:</b> ${s.rollNo}</p>
                                    <p><b>FATHER:</b> ${s.fatherName}</p>
                                    <p><b>D.O.B:</b> ${s.dob}</p>
                                    <p class="text-[8px] leading-tight mt-1"><b>ADDR:</b> ${s.address}</p>
                                </div>
                            </div>
                        </div>
                        <div class="qr-wrapper shadow-sm">
                            <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=${encodeURIComponent(s.verifyURL)}" class="w-14 h-14">
                        </div>
                        <div class="footer-dark uppercase">Quality Education & Digital Verification</div>
                    </div>
                `;
            });
        };

        window.deleteRecord = (id) => {
            if(confirm("Delete student?")) {
                remove(ref(db, 'students/' + id)).then(() => loadTable());
            }
        };

        loadTable();
    </script>
</body>
</html>
