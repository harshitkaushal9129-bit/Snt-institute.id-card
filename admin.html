<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNT Admin - Control Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; margin: 0; }
            .a4-page { 
                width: 210mm; 
                display: grid; 
                grid-template-columns: 1fr 1fr; 
                gap: 5mm; 
                padding: 10mm;
                box-shadow: none;
                margin: 0;
            }
            .card-print { 
                width: 90mm; 
                height: 55mm; 
                border: 1.5px solid #003366; 
                display: flex; 
                padding: 8px; 
                break-inside: avoid;
            }
        }
        .card-print { width: 90mm; height: 55mm; border: 1.5px solid #003366; display: flex; padding: 8px; background: white; }
    </style>
</head>
<body class="bg-gray-900 font-sans p-4">

    <div class="no-print max-w-6xl mx-auto space-y-6">
        <div class="flex justify-between items-center bg-white p-4 rounded-xl shadow-lg border-l-8 border-orange-500">
            <h1 class="text-2xl font-black text-blue-900 uppercase">SNT Admin Hub</h1>
            <div class="flex gap-4">
                <input type="number" id="startNum" placeholder="Start Index" class="border p-2 rounded w-28 text-black">
                <input type="number" id="endNum" placeholder="End Index" class="border p-2 rounded w-28 text-black">
                <button onclick="preparePrint()" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-800 transition">Prepare Print</button>
                <button onclick="window.print()" class="bg-green-600 text-white px-6 py-2 rounded-lg font-bold">Print Now 🖨️</button>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-lg overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-blue-900 text-white">
                    <tr>
                        <th class="p-3 border">#</th>
                        <th class="p-3 border">Photo</th>
                        <th class="p-3 border">Name</th>
                        <th class="p-3 border">Roll No</th>
                        <th class="p-3 border">Course</th>
                        <th class="p-3 border">Action</th>
                    </tr>
                </thead>
                <tbody id="studentTable" class="text-sm">
                    </tbody>
            </table>
        </div>
    </div>

    <div id="printArea" class="hidden a4-page bg-white mx-auto mt-10 shadow-2xl min-h-[297mm]">
        </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getDatabase, ref, get, remove } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDXSZ4T5Yma9Wd28v_GN0zEV4g34SsXmVc",
            authDomain: "id-card-48ec8.firebaseapp.com",
            databaseURL: "https://id-card-48ec8-default-rtdb.firebaseio.com",
            projectId: "id-card-48ec8",
            storageBucket: "id-card-48ec8.firebasestorage.app",
            messagingSenderId: "314458314948",
            appId: "1:314458314948:web:192021fe6cc760dafcd191"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let allStudents = [];

        // Load Data into Table
        async function loadTable() {
            const snap = await get(ref(db, 'students'));
            const table = document.getElementById('studentTable');
            table.innerHTML = "";
            allStudents = [];

            if(snap.exists()){
                let i = 1;
                snap.forEach(child => {
                    const s = child.val();
                    allStudents.push(s);
                    table.innerHTML += `
                        <tr class="hover:bg-gray-100 border-b">
                            <td class="p-3 font-bold text-gray-500">${i}</td>
                            <td class="p-2"><img src="${s.photo}" class="h-10 w-10 rounded border"></td>
                            <td class="p-3 font-bold">${s.name}</td>
                            <td class="p-3">${s.rollNo}</td>
                            <td class="p-3 text-orange-600 font-bold">${s.course}</td>
                            <td class="p-3">
                                <button onclick="deleteStudent('${s.rollNo}')" class="text-red-500 hover:underline">Delete</button>
                            </td>
                        </tr>
                    `;
                    i++;
                });
            }
        }

        // Prepare Print Layout based on Range
        window.preparePrint = () => {
            const start = parseInt(document.getElementById('startNum').value) - 1;
            const end = parseInt(document.getElementById('endNum').value) - 1;
            const area = document.getElementById('printArea');
            area.innerHTML = "";
            area.classList.remove('hidden');

            if(isNaN(start) || isNaN(end)) {
                alert("Please enter a valid Start and End number");
                return;
            }

            const selected = allStudents.slice(start, end + 1);
            selected.forEach(s => {
                area.innerHTML += `
                    <div class="card-print">
                        <div class="w-1/3 text-center border-r pr-2 flex flex-col justify-between">
                            <img src="${s.photo}" class="w-full h-24 object-cover border border-blue-900 rounded">
                            <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=${encodeURIComponent(s.verifyURL)}" class="w-14 h-14 mx-auto mb-2">
                        </div>
                        <div class="w-2/3 pl-3 flex flex-col justify-between">
                            <div>
                                <h2 class="text-[14px] font-black text-blue-900 border-b-2 border-orange-500 pb-1 uppercase">${s.name}</h2>
                                <div class="mt-2 text-[10px] space-y-1">
                                    <p><b>ROLL:</b> ${s.rollNo}</p>
                                    <p><b>COURSE:</b> ${s.course}</p>
                                    <p><b>FATHER:</b> ${s.fatherName}</p>
                                    <p><b>DOB:</b> ${s.dob}</p>
                                </div>
                            </div>
                            <div class="text-[9px] font-bold text-center bg-blue-900 text-white py-1 rounded">
                                SNT COMPUTER INSTITUTE
                            </div>
                        </div>
                    </div>
                `;
            });
            alert(`${selected.length} Cards Prepared! Scroll down to see or press Print.`);
        };

        window.deleteStudent = (id) => {
            if(confirm("Are you sure?")) {
                remove(ref(db, 'students/' + id)).then(() => loadTable());
            }
        };

        loadTable();
    </script>
</body>
</html>
