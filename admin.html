<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNT Admin - Fast Print</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print { .no-print { display: none !important; } .a4-page { width: 210mm; padding: 5mm; display: grid; grid-template-columns: 1fr 1fr; gap: 5mm; } .id-card-print { break-inside: avoid; border: 1px solid #003366 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; } }
        .id-card-print { width: 95mm; height: 65mm; background: white; border-radius: 12px; overflow: hidden; position: relative; border: 1px solid #cbd5e1; font-family: system-ui, sans-serif; margin: 10px; display: flex; flex-direction: column; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .header-blue { background: #003366; height: 16mm; display: flex; align-items: center; padding: 0 10px; color: white; }
        .logo-box { background: white; padding: 2px; border-radius: 4px; height: 12mm; width: 12mm; display: flex; align-items: center; justify-content: center; }
        .header-text { margin-left: 10px; flex-grow: 1; }
        .header-text h1 { font-size: 13px; font-weight: 800; margin: 0; line-height: 1; }
        .header-text p { font-size: 9px; margin: 0; opacity: 0.8; }
        .verified { background: #22c55e; font-size: 8px; font-weight: 900; padding: 2px 8px; border-radius: 10px; }
        .details { display: flex; padding: 10px; gap: 10px; flex-grow: 1; position: relative; }
        .photo { width: 28mm; height: 32mm; border: 2px solid #003366; border-radius: 6px; object-cover: cover; }
        .info { flex-grow: 1; }
        .name { color: #1e3a8a; font-size: 16px; font-weight: 900; text-transform: uppercase; margin-bottom: 2px; }
        .course { color: #ea580c; font-size: 10px; font-weight: 800; font-style: italic; margin-bottom: 6px; }
        .row { display: flex; font-size: 9px; margin-bottom: 2px; border-bottom: 0.5px solid #f1f5f9; }
        .lbl { font-weight: 800; width: 55px; color: #64748b; }
        .val { font-weight: 700; color: #1e293b; text-transform: uppercase; }
        .reg-box { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 6px; margin: 0 10px 6px; padding: 4px 8px; display: flex; align-items: center; gap: 6px; }
        .check { background: #22c55e; color: white; border-radius: 50%; width: 12px; height: 12px; display: flex; align-items: center; justify-content: center; font-size: 7px; }
        .reg-txt { font-size: 8px; color: #166534; line-height: 1.1; }
        .qr { position: absolute; right: 8px; bottom: 8px; width: 40px; height: 40px; border: 1px solid #e2e8f0; background: white; padding: 2px; }
        .footer { background: #00051a; height: 6mm; color: white; display: flex; justify-content: center; align-items: center; font-size: 8px; font-weight: 700; letter-spacing: 0.5px; margin-top: auto; }
    </style>
</head>
<body class="bg-slate-900 text-slate-800">

    <div class="no-print max-w-5xl mx-auto my-6 bg-white p-5 rounded-xl shadow-xl">
        <div class="flex justify-between items-center border-b pb-4 mb-4">
            <h2 class="text-xl font-black text-blue-900 italic">SNT ADMIN HUB</h2>
            <div class="flex gap-2">
                <input type="number" id="startNum" value="1" class="border rounded p-1 w-16 text-center text-sm">
                <input type="number" id="endNum" value="10" class="border rounded p-1 w-16 text-center text-sm">
                <button onclick="window.preparePrint()" class="bg-blue-600 text-white px-4 py-1 rounded font-bold text-sm">Load Cards</button>
                <button onclick="window.print()" class="bg-green-600 text-white px-4 py-1 rounded font-bold text-sm">Print</button>
            </div>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-xs text-left">
                <thead class="bg-slate-100 uppercase">
                    <tr><th class="p-2">Name</th><th class="p-2">Roll No</th><th class="p-2">Course</th><th class="p-2">Action</th></tr>
                </thead>
                <tbody id="studentTable"></tbody>
            </table>
        </div>
    </div>

    <div id="printArea" class="a4-page bg-white mx-auto min-h-screen flex flex-wrap content-start"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getDatabase, ref, get, remove } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDXSZ4T5Yma9Wd28v_GN0zEV4g34SsXmVc",
            authDomain: "id-card-48ec8.firebaseapp.com",
            databaseURL: "https://id-card-48ec8-default-rtdb.firebaseio.com",
            projectId: "id-card-48ec8",
            storageBucket: "id-card-48ec8.firebasestorage.app",
            messagingSenderId: "314458314948",
            appId: "1:314458314948:web:192021fe6cc760dafcd191"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let list = [];

        async function load() {
            const snap = await get(ref(db, 'students'));
            const table = document.getElementById('studentTable');
            table.innerHTML = ""; list = [];
            if(snap.exists()) {
                snap.forEach(c => {
                    const s = c.val(); s.key = c.key; list.push(s);
                    table.innerHTML += `<tr class="border-b">
                        <td class="p-2 font-bold">${s.name}</td>
                        <td class="p-2">${s.rollNo}</td>
                        <td class="p-2">${s.course}</td>
                        <td class="p-2"><button onclick="window.del('${s.key}')" class="text-red-500 font-bold underline">Del</button></td>
                    </tr>`;
                });
            }
        }

        window.preparePrint = () => {
            const start = parseInt(document.getElementById('startNum').value)-1;
            const end = parseInt(document.getElementById('endNum').value);
            const area = document.getElementById('printArea');
            area.innerHTML = "";
            list.slice(start, end).forEach(s => {
                area.innerHTML += `
                <div class="id-card-print">
                    <div class="header-blue">
                        <div class="logo-box"><img src="Logo (1).jpg" class="h-full"></div>
                        <div class="header-text"><h1>SNT COMPUTER INSTITUTE</h1><p>Ayodhya, Uttar Pradesh</p></div>
                        <div class="verified">VERIFIED ✓</div>
                    </div>
                    <div class="details">
                        <img src="${s.photo}" class="photo">
                        <div class="info">
                            <h2 class="name">${s.name}</h2>
                            <p class="course">${s.course}</p>
                            <div class="row"><span class="lbl">ROLL NO:</span><span class="val">${s.rollNo}</span></div>
                            <div class="row"><span class="lbl">FATHER:</span><span class="val">${s.fatherName}</span></div>
                            <div class="row"><span class="lbl">D.O.B:</span><span class="val">${s.dob}</span></div>
                            <div class="mt-1"><span class="text-[7px] font-bold block text-slate-400">ADDRESS:</span><span class="text-[8px] italic leading-none">${s.address}</span></div>
                        </div>
                        <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=${encodeURIComponent(s.verifyURL)}" class="qr">
                    </div>
                    <div class="reg-box">
                        <div class="check">✓</div>
                        <p class="reg-txt">This student is officially registered with <b>SNT Super Net Technologies Pvt. Ltd.</b><br>ISO 9001:2015 Certified.</p>
                    </div>
                    <div class="footer">Quality Education & Digital Transparency</div>
                </div>`;
            });
        };

        window.del = (k) => { if(confirm("Delete?")) remove(ref(db, 'students/'+k)).then(load); };
        load();
    </script>
</body>
</html>
