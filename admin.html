<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNT Admin - Print Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* ID Card Base Styling */
        .id-card-print {
            width: 95mm; height: 60mm; background: white; border-radius: 15px;
            overflow: hidden; position: relative; border: 1px solid #e2e8f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin: 10px;
        }

        /* Blue Header Section */
        .header-blue {
            background: #003366;
            height: 18mm;
            display: flex;
            align-items: center;
            padding: 0 12px;
            position: relative;
        }

        .verified-badge {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: #22c55e;
            color: white;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: bold;
        }

        /* Main Details Area */
        .details-area {
            display: flex;
            padding: 10px 12px;
            gap: 15px;
        }

        .photo-frame {
            width: 28mm;
            height: 33mm;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #003366;
            flex-shrink: 0;
        }

        /* Right Side QR Position */
        .qr-container {
            position: absolute;
            right: 12px;
            bottom: 35px;
            text-align: center;
        }

        .qr-wrapper {
            background: #f0fdf4;
            padding: 4px;
            border-radius: 8px;
            border: 1px solid #bbf7d0;
        }

        /* Footer Styling */
        .footer-dark {
            background: #00051a;
            height: 7mm;
            color: white;
            width: 100%;
            position: absolute;
            bottom: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 10px;
            letter-spacing: 1.5px;
            font-weight: 600;
        }

        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; }
            .a4-page {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 2mm;
                width: 210mm;
            }
            .id-card-print { box-shadow: none; border: 1px solid #ccc; break-inside: avoid; }
        }
    </style>
</head>
<body class="bg-gray-900 p-4">

    <div class="no-print max-w-5xl mx-auto mb-8 bg-white p-6 rounded-xl">
        <div class="flex flex-wrap justify-between items-center gap-4 border-b pb-4 mb-4">
            <h1 class="text-2xl font-black text-blue-900">SNT PRINT HUB</h1>
            <div class="flex gap-2">
                <input type="number" id="startNum" class="border p-2 w-20 rounded" value="1">
                <input type="number" id="endNum" class="border p-2 w-20 rounded" value="10">
                <button onclick="preparePrint()" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold">Generate Cards</button>
                <button onclick="window.print()" class="bg-green-600 text-white px-6 py-2 rounded-lg font-bold">Print</button>
            </div>
        </div>
        <table class="w-full text-sm"><tbody id="studentTable"></tbody></table>
    </div>

    <div id="printArea" class="a4-page bg-white mx-auto min-h-[297mm] p-4 flex flex-wrap content-start">
        <p class="no-print w-full text-center py-20 text-gray-400 font-medium">Click "Generate Cards" to preview...</p>
    </div>

    <script type="module">
        // [Aapka existing Firebase Code yahan rahega...]
        // Niche sirf preparePrint function ka Updated HTML hai:

        window.preparePrint = () => {
            const area = document.getElementById('printArea');
            area.innerHTML = "";
            
            selected.forEach(s => {
                area.innerHTML += `
                    <div class="id-card-print">
                        <div class="header-blue">
                            <img src="Logo (1).jpg" class="h-10 bg-white p-1 rounded-md">
                            <div class="ml-3 text-white">
                                <div class="font-bold text-[14px] leading-tight">SNT COMPUTER INSTITUTE</div>
                                <div class="text-[10px] opacity-90 italic">Ayodhya, Uttar Pradesh</div>
                            </div>
                            <div class="verified-badge">VERIFIED ✓</div>
                        </div>

                        <div class="details-area">
                            <div class="photo-frame">
                                <img src="${s.photo}" class="w-full h-full object-cover">
                            </div>
                            
                            <div class="flex-1">
                                <h2 class="text-[#003366] font-black text-[18px] uppercase leading-none mt-1">${s.name}</h2>
                                <p class="text-orange-600 text-[11px] font-black italic tracking-wider mt-1">${s.course}</p>
                                
                                <div class="text-[10px] text-gray-800 space-y-1 mt-3">
                                    <div class="flex justify-between"><b>ROLL NO:</b> <span class="font-bold">${s.rollNo}</span></div>
                                    <div class="flex flex-col"><b>FATHER:</b> <span>${s.fatherName}</span></div>
                                    <div class="flex justify-between"><b>D.O.B:</b> <span>${s.dob}</span></div>
                                    <div class="mt-1 leading-tight"><b class="block text-[8px]">ADDRESS:</b> <span class="text-[8px] uppercase italic text-blue-900">${s.address}</span></div>
                                </div>
                            </div>
                        </div>

                        <div class="qr-container">
                            <div class="qr-wrapper">
                                <img src="https://api.qrserver.com/v1/create-qr-code/?size=80x80&data=${encodeURIComponent(s.verifyURL)}" class="w-12 h-12">
                            </div>
                        </div>

                        <div class="footer-dark">QUALITY EDUCATION & DIGITAL TRANSPARENCY</div>
                    </div>
                `;
            });
        };
    </script>
</body>
</html>
