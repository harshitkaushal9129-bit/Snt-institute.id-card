<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNT ID Generator | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .id-card { width: 450px; height: 280px; background: white; border-radius: 15px; overflow: hidden; position: relative; border: 1px solid #ddd; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .header-blue { background: linear-gradient(90deg, #003366, #004080); height: 60px; display: flex; justify-content: center; align-items: center; }
        .footer-dark { background: #00051a; height: 35px; position: absolute; bottom: 0; width: 100%; text-align: center; color: white; display: flex; flex-direction: column; justify-content: center; }
    </style>
</head>
<body class="bg-gray-100 p-5 font-sans">

    <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-8">
        <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-orange-500">
            <h2 class="text-2xl font-bold mb-4 text-blue-900 border-b pb-2">Student Registration</h2>
            <form id="idForm" class="space-y-3">
                <input type="text" id="name" placeholder="Full Name" class="w-full p-2 border rounded uppercase" required>
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="rollNo" placeholder="Roll No (e.g. SNT-101)" class="p-2 border rounded" required>
                    <input type="text" id="course" placeholder="Course (O Level, CCC)" class="p-2 border rounded" required>
                </div>
                <input type="text" id="fatherName" placeholder="Father's Name" class="w-full p-2 border rounded">
                
                <div class="grid grid-cols-3 gap-2">
                    <select id="dobDay" class="p-2 border rounded"></select>
                    <select id="dobMonth" class="p-2 border rounded">
                        <option value="01">Jan</option><option value="02">Feb</option><option value="03">Mar</option>
                        <option value="04">Apr</option><option value="05">May</option><option value="06">Jun</option>
                        <option value="07">Jul</option><option value="08">Aug</option><option value="09">Sep</option>
                        <option value="10">Oct</option><option value="11">Nov</option><option value="12">Dec</option>
                    </select>
                    <select id="dobYear" class="p-2 border rounded"></select>
                </div>
                
                <input type="text" id="contact" placeholder="Contact Number" class="w-full p-2 border rounded">
                <input type="text" id="address" placeholder="Address" class="w-full p-2 border rounded">
                
                <label class="block text-sm font-bold text-gray-700">Student Photo:</label>
                <input type="file" id="photoInput" accept="image/*" class="w-full p-1 border rounded" required>
                
                <button type="submit" id="saveBtn" class="w-full bg-blue-900 text-white py-3 rounded-lg font-bold hover:bg-orange-600 transition uppercase">Generate & Save to DB</button>
            </form>
        </div>

        <div class="flex flex-col items-center justify-center space-y-4">
            <div id="id-card-preview" class="id-card bg-white border-2">
                <div class="header-blue">
                    <h1 class="text-white font-bold tracking-tighter">SNT COMPUTER INSTITUTE</h1>
                </div>
                
                <div class="flex p-3 gap-3">
                    <div class="w-1/3 text-center">
                        <div class="border-2 border-blue-900 rounded-lg overflow-hidden h-32 w-full bg-gray-50">
                            <img id="prevImg" src="https://via.placeholder.com/150" class="w-full h-full object-cover">
                        </div>
                        <img id="prevQR" src="https://api.qrserver.com/v1/create-qr-code/?size=60x60&data=SNT" class="w-16 h-16 mx-auto mt-2 border p-1 bg-white">
                    </div>
                    
                    <div class="w-2/3 space-y-1">
                        <h2 id="prevName" class="text-lg font-black text-blue-900 uppercase leading-none">STUDENT NAME</h2>
                        <p id="prevCourse" class="text-xs text-orange-600 font-bold uppercase mb-2 italic">COURSE NAME</p>
                        
                        <div class="text-[11px] text-gray-800 space-y-0.5">
                            <p><b>ROLL:</b> <span id="prevRoll">SNT-XXXX</span></p>
                            <p><b>FATHER:</b> <span id="prevFather">--</span></p>
                            <p><b>D.O.B:</b> <span id="prevDob">--</span></p>
                            <p><b>ADDR:</b> <span id="prevAddress" class="uppercase text-[9px]">--</span></p>
                        </div>
                    </div>
                </div>
                <div class="footer-dark">
                    <p class="text-[10px] font-bold tracking-widest">OFFICIAL STUDENT ID CARD</p>
                </div>
            </div>
            <a href="admin.html" class="text-blue-600 underline font-bold">Go to Admin Print Panel →</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDXSZ4T5Yma9Wd28v_GN0zEV4g34SsXmVc",
            authDomain: "id-card-48ec8.firebaseapp.com",
            databaseURL: "https://id-card-48ec8-default-rtdb.firebaseio.com",
            projectId: "id-card-48ec8",
            storageBucket: "id-card-48ec8.firebasestorage.app",
            messagingSenderId: "314458314948",
            appId: "1:314458314948:web:192021fe6cc760dafcd191"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Populate Dates
        const d = document.getElementById('dobDay'), y = document.getElementById('dobYear');
        for(let i=1; i<=31; i++) d.innerHTML += `<option value="${i<10?'0'+i:i}">${i}</option>`;
        for(let i=new Date().getFullYear(); i>=1990; i--) y.innerHTML += `<option value="${i}">${i}</option>`;

        // Helper: Convert Image to Base64
        const toBase64 = file => new Promise((res, rej) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => res(reader.result);
            reader.onerror = e => rej(e);
        });

        const form = document.getElementById('idForm');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            btn.innerText = "Saving...";
            
            const file = document.getElementById('photoInput').files[0];
            const photoData = await toBase64(file);
            const roll = document.getElementById('rollNo').value.toUpperCase();
            
            const data = {
                name: document.getElementById('name').value.toUpperCase(),
                rollNo: roll,
                fatherName: document.getElementById('fatherName').value.toUpperCase(),
                course: document.getElementById('course').value.toUpperCase(),
                dob: `${d.value}/${document.getElementById('dobMonth').value}/${y.value}`,
                contact: document.getElementById('contact').value,
                address: document.getElementById('address').value,
                photo: photoData,
                verifyURL: `https://harshitkaushal9129-bit.github.io/Snt-institute.id-card/verify.html?id=${roll}`
            };

            set(ref(db, 'students/' + roll), data)
                .then(() => {
                    alert("Record Saved Successfully!");
                    btn.innerText = "Generate & Save to DB";
                    // Update Preview
                    document.getElementById('prevName').innerText = data.name;
                    document.getElementById('prevRoll').innerText = data.rollNo;
                    document.getElementById('prevImg').src = data.photo;
                    document.getElementById('prevQR').src = `https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=${encodeURIComponent(data.verifyURL)}`;
                })
                .catch(err => alert("Error: " + err.message));
        });
    </script>
</body>
</html>
